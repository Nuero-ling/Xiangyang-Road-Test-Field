<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛力斯汽车襄阳试验场 路试员入职考试题</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--primary-color);
        }

        .nav-grid-container {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .nav-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-sub);
        }

        .nav-item:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 导航状态样式 */
        .nav-item.active {
            background-color: #eff6ff;
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .nav-item.answered-correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .nav-item.answered-wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
        }

        .nav-item.answered-correct.active, 
        .nav-item.answered-wrong.active {
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1) inset;
        }

        /* 右侧主体区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-text {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-sub);
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .type-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .type-badge.single {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .type-badge.multi {
            background: #fef3c7;
            color: #d97706;
        }
        .type-badge.boolean {
            background: #dcfce7;
            color: #166534;
        }

        .question-title {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        /* 未答题时的悬浮效果 */
        .option-item.selectable:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
        }

        .option-item.selected {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .option-item.correct {
            border-color: var(--success-color);
            background: #ecfdf5;
        }

        .option-item.wrong {
            border-color: var(--error-color);
            background: #fef2f2;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            flex: 1;
            text-align: center;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.outline {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .explanation-box {
            margin-top: 20px;
            padding: 20px;
            background: #f1f5f9;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            display: none;
        }

        .result-summary {
            text-align: center;
            display: none;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .stat-item {
            padding: 20px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid var(--border-color);
        }

        /* 封面页样式 */
        .cover-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .cover-content {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        .cover-content h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
            line-height: 1.5;
        }
        .cover-content .description {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.8;
            color: var(--text-sub);
            font-size: 14px;
        }
        .cover-content .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .cover-content .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }
        .cover-content .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .cover-content .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .cover-content .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        /* 结果页考生信息 */
        .result-summary .candidate-info {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .result-summary .candidate-info span {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 200px;
                flex-shrink: 0;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .nav-grid-container {
                padding: 10px;
            }
            .main-content {
                padding: 15px;
            }
            .quiz-card {
                padding: 20px;
            }
            .cover-content {
                padding: 30px 20px;
            }
            .cover-content h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div id="cover-page" class="cover-page">
    <div class="cover-content">
        <h1>赛力斯汽车襄阳试验场 路试员入职考试题</h1>
        <div class="description">
            <strong>说明：</strong><br>
            本题库紧扣襄阳路试试验场实际应用场景，聚焦路试员应掌握的基础知识，围绕公司车型功能特性及测试过程中的关键注意事项，专为襄阳试验场路试员入职考核。
        </div>
        <div class="input-group">
            <label for="candidate-name">考生姓名</label>
            <input type="text" id="candidate-name" placeholder="请输入姓名">
        </div>
        <div class="input-group">
            <label for="candidate-id">工号/身份证号</label>
            <input type="text" id="candidate-id" placeholder="请输入工号或身份证号">
        </div>
        <button class="btn" onclick="startExam()">开始考试</button>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-header">
        <h2>答题卡导航</h2>
        <div style="font-size: 12px; color: var(--text-sub); margin-top: 5px;">
            已答：<span id="answered-count">0</span> / 90
        </div>
    </div>
    <div class="nav-grid-container">
        <div class="nav-grid" id="nav-grid">
            </div>
    </div>
</aside>

<main class="main-content">
    <div class="container">
        <header>
            <h1 style="margin:0; font-size: 24px;">赛力斯汽车襄阳试验场 路试员入职考试题</h1>
            <div class="progress-text" id="counter">第 1 题</div>
        </header>

        <div id="quiz-area" class="quiz-card">
            </div>

        <div id="result-area" class="quiz-card result-summary">
            <h2 id="result-title">考试完成！</h2>
            <div class="candidate-info">
                考生姓名：<span id="result-name">-</span><br>
                工号/身份证号：<span id="result-id">-</span><br>
                提交时间：<span id="result-time">-</span><br>
                答题用时：<span id="result-duration">-</span>
            </div>
            <div class="stat-grid">
                <div class="stat-item">
                    <div style="color: var(--primary-color); font-size: 32px; font-weight: bold;" id="correct-count">0</div>
                    <div>得分</div>
                </div>
                <div class="stat-item">
                    <div style="color: var(--text-sub); font-size: 32px; font-weight: bold;" id="score-percent">0</div>
                    <div>总分</div>
                </div>
            </div>
            <div id="pass-status" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></div>
        
        <!-- 错题解析区域 -->
        <div id="wrong-answers" style="margin-top: 30px; display: none;">
            <h3 style="color: var(--error-color); margin-bottom: 15px;">📝 错题解析（最多显示前10条）</h3>
            <div id="wrong-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
        
        <button class="btn" onclick="location.reload()">重新开始考试</button>
    </div>
    </div>
</main>

<script>
// 考生信息
let candidateName = '';
let candidateId = '';
let examStartTime = null;

// 开始考试
function startExam() {
    const name = document.getElementById('candidate-name').value.trim();
    const id = document.getElementById('candidate-id').value.trim();
    
    if (!name) {
        alert('请输入考生姓名');
        return;
    }
    if (!id) {
        alert('请输入工号或身份证号');
        return;
    }
    
    candidateName = name;
    candidateId = id;
    examStartTime = new Date();
    
    document.getElementById('cover-page').style.display = 'none';
    initQuiz();
}

// 路试员考试题库
const allQuizData = [
    // --- 单选题 ---
    { type: 'single', q: '机动车驾驶人初次申领机动车驾驶证后的（ ）为实习期', options: {A:'6个月', B:'12个月', C:'18个月', D:'24个月'}, ans: 'B', exp: '' },
    { type: 'single', q: '本公司襄阳场内试验坡道工况不使用的是（ ）', options: {A:'16.6%', B:'20%', C:'30%', D:'40%'}, ans: 'D', exp: '' },
    { type: 'single', q: '八字广场绕"8"字时，工况要求最低车速是（ ）', options: {A:'10km/h', B:'20km/h', C:'30km/h', D:'40km/h'}, ans: 'B', exp: '' },
    { type: 'single', q: '新研发样车外观已解密但内饰未解密状态下，需（ ）', options: {A:'遮挡所有车窗玻璃', B:'加盖车衣', C:'无需遮挡', D:'车衣、防护挡都需要加以遮挡'}, ans: 'A', exp: '' },
    { type: 'single', q: '机动车遇前方有车辆停车排队等候或者缓慢行驶时，应当（ ）', options: {A:'加速抢行', B:'依次排队通行', C:'减速停车、熄火', D:'借用对向车道超车'}, ans: 'B', exp: '' },
    { type: 'single', q: '通过井盖路工况规定的车速为（ ）', options: {A:'10km/h', B:'25km/h', C:'30km/h', D:'40km/h'}, ans: 'C', exp: '' },
    { type: 'single', q: '场区内各连接道路限速为（ ）', options: {A:'20km/h', B:'30km/h', C:'40km/h', D:'50km/h'}, ans: 'B', exp: '' },
    { type: 'single', q: '本公司试验车辆通过涉、溅水池的车速应为（ ）', options: {A:'10km/h', B:'20km/h', C:'30km/h', D:'40km/h'}, ans: 'B', exp: '' },
    { type: 'single', q: '当强化车辆试验里程为502km，当前配载是（ ）', options: {A:'满载', B:'半载', C:'空载', D:'超载'}, ans: 'B', exp: '' },
    { type: 'single', q: '驾驶机动车拨打、接听手持电话、观看视频等妨碍安全的驾驶行为，一次计并处20-200元（ ）', options: {A:'1分', B:'2分', C:'3分', D:'6分'}, ans: 'C', exp: '' },

    { type: 'single', q: '试验过程中发现车内出现异常危险异味，应（ ）', options: {A:'立即上报并返回车间', B:'立即下电、撤离、警示', C:'打开舱盖检查', D:'继续行驶'}, ans: 'B', exp: '' },

// 随机抽题函数
function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

// 抽取指定数量的题目（按顺序：单选→多选→判断）
function selectQuestions() {
    const singles = allQuizData.filter(q => q.type === 'single');
    const multis = allQuizData.filter(q => q.type === 'multi');
    const booleans = allQuizData.filter(q => q.type === 'boolean');

    const shuffledSingles = shuffleArray(singles);
    const shuffledMultis = shuffleArray(multis);
    const shuffledBooleans = shuffleArray(booleans);

    const selected = [
        ...shuffledSingles.slice(0, 40),
        ...shuffledMultis.slice(0, 10),
        ...shuffledBooleans.slice(0, 40)
    ];

    return selected;
}

// 生成考试题目
const quizData = selectQuestions();

// 状态管理
let currentIndex = 0;
// 记录用户的答题情况。null 表示未答，否则为 { isCorrect: boolean, selectedAnswers: array }
let questionHistory = new Array(quizData.length).fill(null);
let selectedAnswers = [];

function initQuiz() {
    renderSidebar();
    showQuestion();
}

// 渲染左侧导航网格
function renderSidebar() {
    const grid = document.getElementById('nav-grid');
    grid.innerHTML = '';

    let answeredCount = 0;

    quizData.forEach((_, i) => {
        const btn = document.createElement('div');
        btn.className = 'nav-item';
        btn.innerText = i + 1;

        if (questionHistory[i]) {
            answeredCount++;
            btn.classList.add('answered-correct');
        }

        if (i === currentIndex) {
            btn.classList.add('active');
        }

        btn.onclick = () => jumpToQuestion(i);
        grid.appendChild(btn);
    });

    document.getElementById('answered-count').innerText = answeredCount;

    let totalScore = 0;
    quizData.forEach((q, i) => {
        if (questionHistory[i] && questionHistory[i].isCorrect) {
            totalScore += q.type === 'multi' ? 2 : 1;
        }
    });
    window.currentScore = totalScore;
    window.totalAnswered = answeredCount;
}

// 跳转到指定题目
function jumpToQuestion(index) {
    currentIndex = index;
    // 重置当前未提交的选择
    selectedAnswers = [];
    renderSidebar();
    showQuestion();
}

function showQuestion() {
    const quizArea = document.getElementById('quiz-area');
    const question = quizData[currentIndex];
    const history = questionHistory[currentIndex];
    
    // 恢复之前的选择
    if (history) {
        selectedAnswers = [...history.selectedAnswers];
    } else {
        selectedAnswers = [];
    }
    
    let typeText = '';
    let typeClass = '';
    let score = 0;
    let count = 0;
    if(question.type === 'single') {
        typeText = '单选题';
        typeClass = 'single';
        score = 1;
        count = quizData.filter(q => q.type === 'single').length;
    } else if(question.type === 'boolean') {
        typeText = '判断题';
        typeClass = 'boolean';
        score = 1;
        count = quizData.filter(q => q.type === 'boolean').length;
    } else {
        typeText = '多选题';
        typeClass = 'multi';
        score = 2;
        count = quizData.filter(q => q.type === 'multi').length;
    }

    let optionsHtml = '';
    if(question.type === 'boolean') {
        optionsHtml = `
            <div class="option-item selectable" onclick="handleSelect('√')" data-key="√">
                <strong style="margin-right:10px">√</strong> 正确
            </div>
            <div class="option-item selectable" onclick="handleSelect('×')" data-key="×">
                <strong style="margin-right:10px">×</strong> 错误
            </div>
        `;
    } else {
        for(let key in question.options) {
            optionsHtml += `
                <div class="option-item selectable" onclick="handleSelect('${key}')" data-key="${key}">
                    <strong style="margin-right:10px">${key}.</strong> ${question.options[key]}
                </div>
            `;
        }
    }

    // 按钮逻辑：始终显示上一题/下一题
    let buttonsHtml = `<div class="btn-group">`;
    if (currentIndex > 0) {
        buttonsHtml += `<button class="btn outline" onclick="jumpToQuestion(currentIndex - 1)">上一题</button>`;
    }
    if (currentIndex < quizData.length - 1) {
        buttonsHtml += `<button class="btn" onclick="jumpToQuestion(currentIndex + 1)">下一题</button>`;
    } else {
        buttonsHtml += `<button class="btn" onclick="finishQuiz()">查看成绩单</button>`;
    }
    buttonsHtml += `</div>`;

    quizArea.innerHTML = `
        <div class="type-badge ${typeClass}">${typeText} ${score}分/题 共${count}题</div>
        <div class="question-title">${currentIndex + 1}. ${question.q}</div>
        <div class="options-list" id="options-container">
            ${optionsHtml}
        </div>
        <div id="explanation" class="explanation-box"></div>
        ${buttonsHtml}
    `;

    // 如果有之前的选择，高亮显示
    if (selectedAnswers.length > 0) {
        const items = document.querySelectorAll('.option-item');
        items.forEach(item => {
            const dataKey = item.getAttribute('data-key');
            if(selectedAnswers.includes(dataKey)) item.classList.add('selected');
        });
    }

    document.getElementById('counter').innerText = `第 ${currentIndex + 1} / ${quizData.length} 题`;
}

// 处理点击选项
function handleSelect(val) {
    const question = quizData[currentIndex];
    const items = document.querySelectorAll('.option-item');
    
    if(question.type === 'multi') {
        const index = selectedAnswers.indexOf(val);
        if(index > -1) selectedAnswers.splice(index, 1);
        else selectedAnswers.push(val);

        items.forEach(item => {
            const dataKey = item.getAttribute('data-key');
            if(selectedAnswers.includes(dataKey)) item.classList.add('selected');
            else item.classList.remove('selected');
        });
    } else {
        selectedAnswers = [val];
        items.forEach(item => {
            item.classList.remove('selected');
            if(item.getAttribute('data-key') === val) {
                item.classList.add('selected');
            }
        });
    }

    // 自动保存答案
    if (selectedAnswers.length > 0) {
        const userAnswer = selectedAnswers.sort().join('');
        const isCorrect = userAnswer === question.ans;
        questionHistory[currentIndex] = {
            isCorrect: isCorrect,
            selectedAnswers: [...selectedAnswers]
        };
        renderSidebar();
    } else {
        // 如果取消所有选择，清除记录
        questionHistory[currentIndex] = null;
        renderSidebar();
    }
}

function finishQuiz() {
    if (window.totalAnswered < quizData.length) {
        if (!confirm(`你还有 ${quizData.length - window.totalAnswered}道题未答，确定要提前交卷吗？`)) {
            return;
        }
    }

    const totalScore = window.currentScore || 0;
    const totalPossibleScore = quizData.reduce((acc, q) => acc + (q.type === 'multi' ? 2 : 1), 0);
    const passed = totalScore >= 90;    //及格分数线

    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('counter').innerText = '考试结束';
    document.getElementById('correct-count').innerText = totalScore;
    document.getElementById('score-percent').innerText = totalPossibleScore;
    
    // 显示考生信息
    document.getElementById('result-name').innerText = candidateName;
    document.getElementById('result-id').innerText = candidateId;
    
    // 显示提交时间
    const examEndTime = new Date();
    const timeStr = examEndTime.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });
    document.getElementById('result-time').innerText = timeStr;
    
    // 计算并显示答题用时
    if (examStartTime) {
        const duration = examEndTime - examStartTime;
        const minutes = Math.floor(duration / 60000);
        const seconds = Math.floor((duration % 60000) / 1000);
        document.getElementById('result-duration').innerText = `${minutes}分${seconds}秒`;
    } else {
        document.getElementById('result-duration').innerText = '无法计算';
    }

    const passStatus = document.getElementById('pass-status');
    if (passed) {
        passStatus.innerText = '🎉 恭喜！您已通过考试！';
        passStatus.style.color = 'var(--success-color)';
    } else {
        passStatus.innerText = '❌ 很遗憾，您未通过考试（需要 90 分以上才能通过）';
        passStatus.style.color = 'var(--error-color)';
    }

    // 生成错题解析
    showWrongAnswers();
}

// 显示错题解析
function showWrongAnswers() {
    const wrongList = document.getElementById('wrong-list');
    const wrongAnswersDiv = document.getElementById('wrong-answers');
    wrongList.innerHTML = '';
    
    const wrongQuestions = [];
    
    quizData.forEach((question, index) => {
        const history = questionHistory[index];
        if (history && !history.isCorrect) {
            wrongQuestions.push({
                index: index + 1,
                question: question,
                selectedAnswer: history.selectedAnswers.join(', ') || '未作答',
                correctAnswer: question.ans
            });
        }
    });
    
    if (wrongQuestions.length === 0) {
        wrongAnswersDiv.style.display = 'none';
        return;
    }
    
    // 最多显示前10条
    const displayQuestions = wrongQuestions.slice(0, 10);
    
    displayQuestions.forEach(item => {
        const typeText = item.question.type === 'single' ? '单选题' : 
                         item.question.type === 'boolean' ? '判断题' : '多选题';
        
        const itemDiv = document.createElement('div');
        itemDiv.style.cssText = `
            background: #fff5f5;
            border-left: 4px solid var(--error-color);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            text-align: left;
        `;
        
        // 生成选项列表（判断题除外）
        let optionsHtml = '';
        if (item.question.type !== 'boolean' && item.question.options) {
            optionsHtml = '<div style="margin-bottom: 8px; font-size: 14px; text-align: left;"><strong>选项：</strong><br>';
            Object.keys(item.question.options).forEach(key => {
                let optionStyle = '';
                if (item.correctAnswer.includes(key)) {
                    optionStyle = 'background: #dcfce7; color: #16a34a; padding: 2px 6px; border-radius: 4px;';
                } else if (item.selectedAnswer.includes(key)) {
                    optionStyle = 'background: #fee2e2; color: #dc2626; padding: 2px 6px; border-radius: 4px;';
                }
                optionsHtml += `<span style="${optionStyle}; display: block; margin-bottom: 4px;">${key}. ${item.question.options[key]}</span>`;
            });
            optionsHtml += '</div>';
        }
        
        itemDiv.innerHTML = `
            <div style="font-weight: bold; color: var(--error-color); margin-bottom: 8px; text-align: left;">
                第${item.index}题（${typeText}）
            </div>
            <div style="margin-bottom: 8px; text-align: left;">
                <strong>题目：</strong>${item.question.q}
            </div>
            ${optionsHtml}
            <div style="text-align: left;">
                <div style="color: #dc2626; margin-bottom: 4px; font-size: 14px;">
                    <strong>您的答案：</strong>${item.selectedAnswer}
                </div>
                <div style="color: #16a34a; font-size: 14px;">
                    <strong>正确答案：</strong>${item.correctAnswer}
                </div>
            </div>
        `;
        
        wrongList.appendChild(itemDiv);
    });
    
    if (wrongQuestions.length > 10) {
        const moreDiv = document.createElement('div');
        moreDiv.style.cssText = `
            text-align: center;
            color: var(--text-sub);
            font-size: 14px;
            margin-top: 10px;
        `;
        moreDiv.innerText = `... 还有 ${wrongQuestions.length - 10} 道错题未显示`;
        wrongList.appendChild(moreDiv);
    }
    
    wrongAnswersDiv.style.display = 'block';
}

// 初始化
initQuiz();
</script>
